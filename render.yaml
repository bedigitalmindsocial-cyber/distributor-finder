services:
  - type: web
    name: distributor-finder
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --timeout 60 --workers 1
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/distributors.db
      - key: ADMIN_KEY
        generateValue: false
